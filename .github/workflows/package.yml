name: Package

# Triggered on version tags (v0.7.0, v0.8.0, etc.) and manually
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      channel:
        description: 'Build channel'
        required: true
        default: 'stable'
        type: choice
        options:
          - stable
          - canary

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Linux AppImage / Installer (Ubuntu)
  # ──────────────────────────────────────────────────────────────────────────
  package-linux:
    name: Package Linux
    runs-on: ubuntu-22.04        # Use 22.04 for glibc 2.35 ABI compatibility

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── System deps ────────────────────────────────────────────────────────
      - name: Install GTK + WebKitGTK
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libgtk-4-dev libwebkit2gtk-4.1-dev \
            libglib2.0-dev libcairo2-dev \
            build-essential cmake ninja-build \
            libopenblas-dev

      # ── Bun runtime ────────────────────────────────────────────────────────
      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      # ── pnpm ───────────────────────────────────────────────────────────────
      - name: Install pnpm
        run: npm install -g pnpm

      # ── Node deps ──────────────────────────────────────────────────────────
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # ── Build static whisper-cli ────────────────────────────────────────────
      # Static linking ensures no Linuxbrew/Homebrew runtime dependency.
      # The binary is placed in scripts/bin/ where post-build.sh picks it up.
      - name: Build static whisper-cli
        run: |
          mkdir -p scripts/bin

          # Clone whisper.cpp at a pinned tag for reproducibility
          git clone --depth=1 --branch v1.7.4 https://github.com/ggerganov/whisper.cpp.git /tmp/whisper.cpp
          cd /tmp/whisper.cpp

          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DWHISPER_BUILD_TESTS=OFF \
            -DWHISPER_BUILD_EXAMPLES=ON \
            -DGGML_OPENMP=OFF \
            -DGGML_BLAS=ON \
            -DGGML_BLAS_VENDOR=OpenBLAS \
            -G Ninja

          cmake --build build --config Release -j$(nproc)

          # The CLI binary is named 'main' or 'whisper-cli' depending on version
          WHISPER_BIN=$(find build -name 'main' -o -name 'whisper-cli' 2>/dev/null | head -1)
          if [ -z "$WHISPER_BIN" ]; then
            echo "ERROR: whisper binary not found after build"
            find build -type f -executable | head -20
            exit 1
          fi

          cp "$WHISPER_BIN" "$GITHUB_WORKSPACE/scripts/bin/whisper-cli"
          chmod +x "$GITHUB_WORKSPACE/scripts/bin/whisper-cli"
          echo "whisper-cli size: $(du -sh $GITHUB_WORKSPACE/scripts/bin/whisper-cli)"

          # Verify it's statically linked (ldd should show "not a dynamic executable")
          ldd "$GITHUB_WORKSPACE/scripts/bin/whisper-cli" || true

      # ── Build static llama-cli ──────────────────────────────────────────────
      - name: Build static llama-cli
        run: |
          mkdir -p scripts/bin

          git clone --depth=1 --branch b5106 https://github.com/ggerganov/llama.cpp.git /tmp/llama.cpp
          cd /tmp/llama.cpp

          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DBUILD_SHARED_LIBS=OFF \
            -DLLAMA_BUILD_TESTS=OFF \
            -DLLAMA_BUILD_EXAMPLES=ON \
            -DGGML_OPENMP=OFF \
            -DGGML_BLAS=ON \
            -DGGML_BLAS_VENDOR=OpenBLAS \
            -G Ninja

          cmake --build build --target llama-cli --config Release -j$(nproc)

          LLAMA_BIN=$(find build -name 'llama-cli' -o -name 'main' 2>/dev/null | head -1)
          if [ -z "$LLAMA_BIN" ]; then
            echo "ERROR: llama binary not found after build"
            find build -type f -executable | head -20
            exit 1
          fi

          cp "$LLAMA_BIN" "$GITHUB_WORKSPACE/scripts/bin/llama-cli"
          chmod +x "$GITHUB_WORKSPACE/scripts/bin/llama-cli"
          echo "llama-cli size: $(du -sh $GITHUB_WORKSPACE/scripts/bin/llama-cli)"

      # ── Electrobun stable build ────────────────────────────────────────────
      # The post-build hook (scripts/post-build.sh) injects the static binaries.
      - name: Build renderer (Vite)
        run: pnpm run build

      - name: Build Electrobun stable package
        env:
          ELECTROBUN_BUILD_ENV: stable
        run: |
          ELECTROBUN_BIN="node_modules/.pnpm/electrobun@1.15.1/node_modules/electrobun/.cache/electrobun"

          # Make post-build hook executable
          chmod +x scripts/post-build.sh

          # Run the stable build
          "$ELECTROBUN_BIN" build --env=stable

      # ── Verify output ──────────────────────────────────────────────────────
      - name: Verify artifacts
        run: |
          echo "=== artifacts/ ==="
          ls -lh artifacts/ || echo "(no artifacts dir)"

          # Verify the installer archive was produced
          INSTALLER=$(find artifacts -name '*-Setup.tar.gz' 2>/dev/null | head -1)
          if [ -z "$INSTALLER" ]; then
            echo "ERROR: No installer archive found in artifacts/"
            exit 1
          fi

          echo "Installer: $INSTALLER ($(du -sh $INSTALLER | cut -f1))"

          # Peek inside the installer
          echo "=== Installer contents ==="
          tar -tzf "$INSTALLER" | head -20

          # Verify update.json was produced
          UPDATE_JSON=$(find artifacts -name '*-update.json' 2>/dev/null | head -1)
          if [ -n "$UPDATE_JSON" ]; then
            echo "=== update.json ==="
            cat "$UPDATE_JSON"
          fi

      # ── Upload artifacts ────────────────────────────────────────────────────
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VoiceVault-linux-x64
          path: artifacts/
          retention-days: 30

      # ── Create GitHub Release (on tag push) ────────────────────────────────
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          draft: true                       # Review release notes before publishing
          generate_release_notes: true
          body: |
            ## VoiceVault ${{ github.ref_name }}

            ### Installation (Linux x64)

            1. Download `VoiceVault-Setup.tar.gz`
            2. Extract: `tar -xzf VoiceVault-Setup.tar.gz`
            3. Run: `./installer`

            The installer extracts VoiceVault to `~/.local/share/VoiceVault/` and
            creates a desktop shortcut.

            ### AI Models

            On first launch, VoiceVault will prompt you to download the Whisper
            model (~75 MB). This requires an internet connection on first run only.

            ### Requirements

            - Linux x64 (glibc 2.35+, Ubuntu 22.04+)
            - GTK 4 + WebKitGTK: `sudo apt install libwebkit2gtk-4.1-dev`
            - No Python, no Docker, no separate runtime installation

  # ──────────────────────────────────────────────────────────────────────────
  # macOS (placeholder — requires Apple Developer cert for code signing)
  # ──────────────────────────────────────────────────────────────────────────
  package-mac:
    name: Package macOS
    runs-on: macos-14            # arm64 (Apple Silicon)
    if: false                    # Enable when Apple Developer credentials are configured

    steps:
      - uses: actions/checkout@v4

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: '1.3.10'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build whisper-cli (macOS, static)
        run: |
          mkdir -p scripts/bin
          git clone --depth=1 --branch v1.7.4 https://github.com/ggerganov/whisper.cpp.git /tmp/whisper.cpp
          cd /tmp/whisper.cpp
          cmake -B build -DCMAKE_BUILD_TYPE=Release -DBUILD_SHARED_LIBS=OFF -DWHISPER_BUILD_EXAMPLES=ON
          cmake --build build -j$(sysctl -n hw.ncpu)
          WHISPER_BIN=$(find build -name 'main' -o -name 'whisper-cli' 2>/dev/null | head -1)
          cp "$WHISPER_BIN" "$GITHUB_WORKSPACE/scripts/bin/whisper-cli"
          chmod +x "$GITHUB_WORKSPACE/scripts/bin/whisper-cli"

      - name: Build (Vite + Electrobun)
        run: |
          chmod +x scripts/post-build.sh
          pnpm run build
          ELECTROBUN_BIN="node_modules/.pnpm/electrobun@1.15.1/node_modules/electrobun/.cache/electrobun"
          "$ELECTROBUN_BIN" build --env=stable

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: VoiceVault-macos-arm64
          path: artifacts/
